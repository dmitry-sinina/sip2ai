apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sip2ai.fullname" . }}
  labels:
    {{- include "sip2ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sip2ai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "sip2ai.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sip2ai
          image: "{{ .Values.image.repository }}:{{ include "sip2ai.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: sip
              containerPort: {{ .Values.config.sip.bind_port }}
              protocol: {{ .Values.service.sipProtocol }}
          env:
            - name: SIP_BIND_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sip2ai.secretName" . }}
                  key: openai
                  optional: true
            - name: DEEPGRAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sip2ai.secretName" . }}
                  key: deepgram
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sip2ai.secretName" . }}
                  key: gemini
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/sip2ai/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "sip2ai.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
